name: Publish to JSR
on:
  release:
    types: [published]
  workflow_dispatch:
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno publish --allow-dirty --no-check
